<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.data.settings.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.data.settings.description }}{% endif %}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  <link rel="shortcut icon" href="{{ '/assets/images/wxgzh/logo.jpg' | relative_url }}" type="image/jpeg" />
  <link rel="icon" href="{{ '/assets/images/wxgzh/logo.jpg' | relative_url }}" type="image/jpeg" />
  {% if site.data.settings.google-analytics %}
    {% include google-analytics.html %}
  {% endif %}
</head>
