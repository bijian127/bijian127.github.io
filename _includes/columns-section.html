<!-- columns -->
<section class="section">
  <div class="container">
    <div class="row">
      <div class="col-12 text-center">
        <h2 class="section-title">{{ site.data.settings.columns-title }}</h2>
      </div>
    </div>
    <div class="row">
      {% for col in site.data.settings.columns %}
      <div class="col-lg-4 col-md-6 mb-4">
        <div class="column-card rounded p-4 h-100" style="border-top: 3px solid {{ col.color }}">
          <div class="d-flex align-items-center mb-3">
            <span class="column-icon mr-3" style="font-size:2rem;background:{{ col.color }}15;width:52px;height:52px;display:flex;align-items:center;justify-content:center;border-radius:12px;">{{ col.icon }}</span>
            <div>
              <h5 class="mb-0" style="color:{{ col.color }}">{{ col.name }}</h5>
              <small class="text-muted">{{ col.time }}</small>
            </div>
          </div>
          <p class="text-muted mb-0" style="font-size:0.9rem">{{ col.desc }}</p>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
<!-- /columns -->
