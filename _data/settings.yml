blurb: >-
  我是 Bi，一名系统工程师，目前在新能源领域从事系统方案设计。
  此前多年专注于 Java 后端开发，对分布式系统、微服务架构有深入理解。
  从编码转向系统设计后，视角从「怎么实现」切换到「为什么这样做」，
  这种转变让我对技术有了更立体的认知。
  不庸AI 是我分享 AI 技术探索的个人空间，内容涵盖大模型应用、
  Agent 开发、工程效率工具等。相信在技术洪流中保持独立思考，
