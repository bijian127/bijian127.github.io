baseurl: "" # the subpath of your site, e.g. /blog
url: "https://bijian127.github.io" # the base hostname & protocol for your site, e.g. http://example.com
title: "不庸AI"
description: "AI 技术探索与实践笔记"

# Build settings
markdown: kramdown
permalink: pretty
plugins:
  - jekyll-sitemap
compress_html:
  clippings: all
  comments: all
  startings: [html, head, body]

# Pages Path
defaults:
  - scope:
      path: "_pages"
    values:
      permalink: /:basename:output_ext

include:
  - _pages

# Show posts with future dates (so today's post appears immediately)
future: true

# Exclude from processing.
exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE.text
  - README.md
  - SECURITY.md
